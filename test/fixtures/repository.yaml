routes:
  # Object search — query param captured into ${q} and echoed into the response.
  # Specificity 1 (has match.query); preferred over the fallback below.
  - method: GET
    path: /sap/bc/adt/repository/informationsystem/search
    match:
      query:
        query: "{q}"
    response:
      content-type: application/xml; charset=utf-8
      body: |
        <?xml version="1.0" encoding="UTF-8"?>
        <adtcore:objectReferences xmlns:adtcore="http://www.sap.com/adt/core">
          <adtcore:objectReference
            adtcore:uri="/sap/bc/adt/programs/programs/${q}"
            adtcore:type="PROG/P"
            adtcore:name="${q}"
            adtcore:packageName="$TMP"
            adtcore:description="Test program matching ${q}"/>
          <adtcore:objectReference
            adtcore:uri="/sap/bc/adt/oo/classes/ZCL_${q}"
            adtcore:type="CLAS/OC"
            adtcore:name="ZCL_${q}"
            adtcore:packageName="$TMP"
            adtcore:description="Test class matching ${q}"/>
        </adtcore:objectReferences>

  # Object search fallback — no query param present (specificity 0).
  - method: GET
    path: /sap/bc/adt/repository/informationsystem/search
    response:
      content-type: application/xml; charset=utf-8
      body: |
        <?xml version="1.0" encoding="UTF-8"?>
        <adtcore:objectReferences xmlns:adtcore="http://www.sap.com/adt/core">
          <adtcore:objectReference
            adtcore:uri="/sap/bc/adt/programs/programs/ZTEST"
            adtcore:type="PROG/P"
            adtcore:name="ZTEST"
            adtcore:packageName="$TMP"
            adtcore:description="Default test program"/>
          <adtcore:objectReference
            adtcore:uri="/sap/bc/adt/oo/classes/ZCL_ZTEST"
            adtcore:type="CLAS/OC"
            adtcore:name="ZCL_ZTEST"
            adtcore:packageName="$TMP"
            adtcore:description="Default test class"/>
        </adtcore:objectReferences>

  # Package node structure — parent_name captured into ${pkg} (specificity 1).
  - method: POST
    path: /sap/bc/adt/repository/nodestructure
    match:
      query:
        parent_name: "{pkg}"
    response:
      content-type: application/xml; charset=utf-8
      body: |
        <?xml version="1.0" encoding="UTF-8"?>
        <asx:abap xmlns:asx="http://www.sap.com/abapxml" version="1.0">
          <asx:values>
            <DATA>
              <TREE_CONTENT>
                <SEU_ADT_REPOSITORY_OBJ_NODE>
                  <OBJECT_TYPE>PROG/P</OBJECT_TYPE>
                  <OBJECT_NAME>Z${pkg}_MAIN</OBJECT_NAME>
                  <OBJECT_URI>/sap/bc/adt/programs/programs/z${pkg}_main</OBJECT_URI>
                  <DESCRIPTION>Main program of ${pkg}</DESCRIPTION>
                </SEU_ADT_REPOSITORY_OBJ_NODE>
                <SEU_ADT_REPOSITORY_OBJ_NODE>
                  <OBJECT_TYPE>CLAS/OC</OBJECT_TYPE>
                  <OBJECT_NAME>ZCL_${pkg}</OBJECT_NAME>
                  <OBJECT_URI>/sap/bc/adt/oo/classes/zcl_${pkg}</OBJECT_URI>
                  <DESCRIPTION>Main class of ${pkg}</DESCRIPTION>
                </SEU_ADT_REPOSITORY_OBJ_NODE>
              </TREE_CONTENT>
            </DATA>
          </asx:values>
        </asx:abap>

  # Package node structure fallback — no parent_name param (specificity 0).
  - method: POST
    path: /sap/bc/adt/repository/nodestructure
    response:
      content-type: application/xml; charset=utf-8
      body: |
        <?xml version="1.0" encoding="UTF-8"?>
        <asx:abap xmlns:asx="http://www.sap.com/abapxml" version="1.0">
          <asx:values>
            <DATA>
              <TREE_CONTENT>
                <SEU_ADT_REPOSITORY_OBJ_NODE>
                  <OBJECT_TYPE>PROG/P</OBJECT_TYPE>
                  <OBJECT_NAME>ZZTEST_MAIN</OBJECT_NAME>
                  <OBJECT_URI>/sap/bc/adt/programs/programs/zztest_main</OBJECT_URI>
                  <DESCRIPTION>Main program of ZTEST</DESCRIPTION>
                </SEU_ADT_REPOSITORY_OBJ_NODE>
                <SEU_ADT_REPOSITORY_OBJ_NODE>
                  <OBJECT_TYPE>CLAS/OC</OBJECT_TYPE>
                  <OBJECT_NAME>ZCL_ZTEST</OBJECT_NAME>
                  <OBJECT_URI>/sap/bc/adt/oo/classes/zcl_ztest</OBJECT_URI>
                  <DESCRIPTION>Main class of ZTEST</DESCRIPTION>
                </SEU_ADT_REPOSITORY_OBJ_NODE>
              </TREE_CONTENT>
            </DATA>
          </asx:values>
        </asx:abap>

