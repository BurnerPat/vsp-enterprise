routes:
  # --- Tables ---

  - method: GET
    path: /sap/bc/adt/ddic/tables/{name}/source/main
    action: get-source
    response:
      content-type: text/plain; charset=utf-8
      body: |
        @EndUserText.label: '${name}'
        @AbapCatalog.enhancement.category: #NOT_EXTENSIBLE
        define table ${name} {
          key mandt : mandt not null;
          key id    : numc10 not null;
          value     : char255;
        }

  - method: PUT
    path: /sap/bc/adt/ddic/tables/{name}/source/main
    action: store-source

  - method: POST
    path: /sap/bc/adt/ddic/tables/{name}
    match:
      query:
        _action: LOCK
      accept: application/vnd.sap.as+xml
    action: lock

  - method: POST
    path: /sap/bc/adt/ddic/tables/{name}
    match:
      query:
        _action: UNLOCK
    action: unlock

  # --- Structures ---

  - method: GET
    path: /sap/bc/adt/ddic/structures/{name}/source/main
    action: get-source
    response:
      content-type: text/plain; charset=utf-8
      body: |
        @EndUserText.label: '${name}'
        define structure ${name} {
          id    : numc10;
          value : char255;
        }

  - method: PUT
    path: /sap/bc/adt/ddic/structures/{name}/source/main
    action: store-source

  - method: POST
    path: /sap/bc/adt/ddic/structures/{name}
    match:
      query:
        _action: LOCK
      accept: application/vnd.sap.as+xml
    action: lock

  - method: POST
    path: /sap/bc/adt/ddic/structures/{name}
    match:
      query:
        _action: UNLOCK
    action: unlock

  # --- Views ---

  - method: GET
    path: /sap/bc/adt/ddic/views/{name}/source/main
    action: get-source
    response:
      content-type: text/plain; charset=utf-8
      body: |
        @EndUserText.label: '${name}'
        define view ${name} as select from t000 {
          mandt,
          mtext
        }

  - method: PUT
    path: /sap/bc/adt/ddic/views/{name}/source/main
    action: store-source

  # --- CDS DDL Sources ---

  - method: GET
    path: /sap/bc/adt/ddic/ddl/sources/{name}/source/main
    action: get-source
    response:
      content-type: text/plain; charset=utf-8
      body: |
        @EndUserText.label: '${name}'
        @AccessControl.authorizationCheck: #CHECK
        define view entity ${name}
          as select from t000
        {
          key mandt as Client,
              mtext as Description
        }

  - method: PUT
    path: /sap/bc/adt/ddic/ddl/sources/{name}/source/main
    action: store-source

  - method: POST
    path: /sap/bc/adt/ddic/ddl/sources/{name}
    match:
      query:
        _action: LOCK
      accept: application/vnd.sap.as+xml
    action: lock

  - method: POST
    path: /sap/bc/adt/ddic/ddl/sources/{name}
    match:
      query:
        _action: UNLOCK
    action: unlock

  - method: POST
    path: /sap/bc/adt/ddic/ddl/sources/{name}
    response:
      status: 201
      headers:
        Location: "/sap/bc/adt/ddic/ddl/sources/${name}"

  # --- Service Definitions (SRVD) ---

  - method: GET
    path: /sap/bc/adt/ddic/srvd/sources/{name}/source/main
    action: get-source
    response:
      content-type: text/plain; charset=utf-8
      body: |
        @EndUserText.label: '${name}'
        define service ${name} {
          expose ZI_DEMO as Demo;
        }

  - method: PUT
    path: /sap/bc/adt/ddic/srvd/sources/{name}/source/main
    action: store-source

  # --- Data Elements ---

  - method: GET
    path: /sap/bc/adt/ddic/dataelements/{name}
    response:
      content-type: application/xml; charset=utf-8
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <dataElement xmlns="http://www.sap.com/adt/ddic"
          name="${name}" type="CHAR" length="10" decimals="0"
          description="Data element ${name} (test server)"/>

  # --- Behavior Definitions (BDEF) ---

  - method: GET
    path: /sap/bc/adt/bo/behaviordefinitions/{name}/source/main
    action: get-source
    response:
      content-type: text/plain; charset=utf-8
      body: |
        managed implementation in class ZBP_${name} unique;

        define behavior for ${name} alias Demo
        persistent table zdemo
        lock master
        authorization master ( instance )
        {
          create;
          update;
          delete;
        }

  - method: PUT
    path: /sap/bc/adt/bo/behaviordefinitions/{name}/source/main
    action: store-source

  - method: POST
    path: /sap/bc/adt/bo/behaviordefinitions/{name}
    match:
      query:
        _action: LOCK
      accept: application/vnd.sap.as+xml
    action: lock

  - method: POST
    path: /sap/bc/adt/bo/behaviordefinitions/{name}
    match:
      query:
        _action: UNLOCK
    action: unlock

  - method: POST
    path: /sap/bc/adt/bo/behaviordefinitions/{name}
    response:
      status: 201
      headers:
        Location: "/sap/bc/adt/bo/behaviordefinitions/${name}"

