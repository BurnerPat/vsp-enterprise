routes:
  # GET function group descriptor.
  - method: GET
    path: /sap/bc/adt/functions/groups/{group}
    response:
      content-type: application/xml; charset=utf-8
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <fugr:functionGroup xmlns:fugr="http://www.sap.com/adt/functions"
          xmlns:adtcore="http://www.sap.com/adt/core"
          adtcore:name="${group}"
          adtcore:description="Function group ${group} (test server)">
          <fugr:functionModules>
            <fugr:functionModule adtcore:uri="/sap/bc/adt/functions/groups/${group}/fmodules/Z${group}_MAIN"
              adtcore:name="Z${group}_MAIN"
              adtcore:description="Main function module"/>
          </fugr:functionModules>
        </fugr:functionGroup>

  # GET function module source.
  - method: GET
    path: /sap/bc/adt/functions/groups/{group}/fmodules/{name}/source/main
    action: get-source
    response:
      content-type: text/plain; charset=utf-8
      body: |
        FUNCTION ${name}.
        *"----------------------------------------------------------------------
        *"*"Local Interface:
        *"  IMPORTING
        *"     VALUE(IV_INPUT) TYPE  STRING OPTIONAL
        *"  EXPORTING
        *"     VALUE(EV_OUTPUT) TYPE  STRING
        *"----------------------------------------------------------------------

          EV_OUTPUT = |Result from { '${name}' }|.

        ENDFUNCTION.

  - method: PUT
    path: /sap/bc/adt/functions/groups/{group}/fmodules/{name}/source/main
    action: store-source

  - method: POST
    path: /sap/bc/adt/functions/groups/{group}/fmodules/{name}
    match:
      query:
        _action: LOCK
      accept: application/vnd.sap.as+xml
    action: lock

  - method: POST
    path: /sap/bc/adt/functions/groups/{group}/fmodules/{name}
    match:
      query:
        _action: UNLOCK
    action: unlock

  - method: POST
    path: /sap/bc/adt/functions/groups/{group}/fmodules/{name}
    response:
      status: 201
      headers:
        Location: "/sap/bc/adt/functions/groups/${group}/fmodules/${name}"

  - method: POST
    path: /sap/bc/adt/functions/groups/{group}
    match:
      query:
        _action: LOCK
      accept: application/vnd.sap.as+xml
    action: lock

  - method: POST
    path: /sap/bc/adt/functions/groups/{group}
    match:
      query:
        _action: UNLOCK
    action: unlock

  - method: POST
    path: /sap/bc/adt/functions/groups/{group}
    response:
      status: 201
      headers:
        Location: "/sap/bc/adt/functions/groups/${group}"

