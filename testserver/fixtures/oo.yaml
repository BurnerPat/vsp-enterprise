routes:
  # --- Classes ---

  - method: GET
    path: /sap/bc/adt/oo/classes/{name}/source/main
    action: get-source
    response:
      content-type: text/plain; charset=utf-8
      body: |
        CLASS ${name} DEFINITION
          PUBLIC
          FINAL
          CREATE PUBLIC.

          PUBLIC SECTION.
            METHODS: constructor,
                     do_something RETURNING VALUE(rv_result) TYPE string.

          PROTECTED SECTION.
          PRIVATE SECTION.
        ENDCLASS.

        CLASS ${name} IMPLEMENTATION.

          METHOD constructor.
          ENDMETHOD.

          METHOD do_something.
            rv_result = '${name} works'.
          ENDMETHOD.

        ENDCLASS.

  - method: PUT
    path: /sap/bc/adt/oo/classes/{name}/source/main
    action: store-source

  - method: GET
    path: /sap/bc/adt/oo/classes/{name}/objectstructure
    response:
      content-type: application/xml; charset=utf-8
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <adtcore:objectStructure xmlns:adtcore="http://www.sap.com/adt/core"
          xmlns:adtobj="http://www.sap.com/adt/objectstructure/v2"
          adtcore:uri="/sap/bc/adt/oo/classes/${name}"
          adtcore:type="CLAS/OC"
          adtcore:name="${name}">
          <adtobj:methodList>
            <adtobj:method adtobj:name="CONSTRUCTOR"
              adtobj:visibility="public"
              adtobj:level="instance"
              adtobj:definitionStart="7" adtobj:definitionEnd="7"
              adtobj:implementationStart="21" adtobj:implementationEnd="22"/>
            <adtobj:method adtobj:name="DO_SOMETHING"
              adtobj:visibility="public"
              adtobj:level="instance"
              adtobj:definitionStart="8" adtobj:definitionEnd="8"
              adtobj:implementationStart="25" adtobj:implementationEnd="27"/>
          </adtobj:methodList>
        </adtcore:objectStructure>

  - method: POST
    path: /sap/bc/adt/oo/classes/{name}
    match:
      query:
        _action: LOCK
      accept: application/vnd.sap.as+xml
    action: lock

  - method: POST
    path: /sap/bc/adt/oo/classes/{name}
    match:
      query:
        _action: UNLOCK
    action: unlock

  - method: POST
    path: /sap/bc/adt/oo/classes/{name}
    response:
      status: 201
      headers:
        Location: "/sap/bc/adt/oo/classes/${name}"

  - method: POST
    path: /sap/bc/adt/oo/classes
    response:
      status: 201
      headers:
        Location: "/sap/bc/adt/oo/classes/ZCL_NEW"

  - method: DELETE
    path: /sap/bc/adt/oo/classes/{name}
    action: delete

  # --- Interfaces ---

  - method: GET
    path: /sap/bc/adt/oo/interfaces/{name}/source/main
    action: get-source
    response:
      content-type: text/plain; charset=utf-8
      body: |
        INTERFACE ${name}
          PUBLIC.

          METHODS: do_something RETURNING VALUE(rv_result) TYPE string.

        ENDINTERFACE.

  - method: PUT
    path: /sap/bc/adt/oo/interfaces/{name}/source/main
    action: store-source

  - method: POST
    path: /sap/bc/adt/oo/interfaces/{name}
    match:
      query:
        _action: LOCK
      accept: application/vnd.sap.as+xml
    action: lock

  - method: POST
    path: /sap/bc/adt/oo/interfaces/{name}
    match:
      query:
        _action: UNLOCK
    action: unlock

  - method: POST
    path: /sap/bc/adt/oo/interfaces/{name}
    response:
      status: 201
      headers:
        Location: "/sap/bc/adt/oo/interfaces/${name}"

  - method: POST
    path: /sap/bc/adt/oo/interfaces
    response:
      status: 201
      headers:
        Location: "/sap/bc/adt/oo/interfaces/ZIF_NEW"

  - method: DELETE
    path: /sap/bc/adt/oo/interfaces/{name}
    action: delete

